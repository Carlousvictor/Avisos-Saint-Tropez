<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quadro de Tarefas – SD Saint Tropez</title>
  <meta name="description" content="Quadro de tarefas periódicas do Condomínio Jardim Saint Tropez." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --st-light-blue: #53B5FD;
      --st-teal:       #009999;
      --st-mid-blue:   #039CC9;
      --st-dark-blue:  #027191;
      --st-light:      #C1E8FF;

      --bg:      #eef2f7;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1e293b;
      --muted:   #64748b;

      --radius:    14px;
      --radius-sm: 8px;
      --ease:      cubic-bezier(.4,0,.2,1);

      --c-daily:     #dc2626;
      --c-weekly:    #ea580c;
      --c-biweekly:  #ca8a04;
      --c-monthly:   #16a34a;
      --c-quarterly: #7c3aed;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    /* ─── Header ─── */
    header {
      background: linear-gradient(135deg, var(--st-mid-blue) 0%, var(--st-dark-blue) 100%);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .brand { display: flex; align-items: center; gap: 16px; }
    .brand-logo img { height: 46px; width: auto; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .brand-text h1 { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .brand-text p  { font-size: .8rem; color: var(--st-light); opacity: .85; margin-top: 2px; }

    .header-date {
      font-size: .82rem; font-weight: 600; color: #1e4a63;
      background: #fff;
      padding: 7px 16px; border-radius: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      white-space: nowrap;
    }

    /* ─── Board ─── */
    .board-wrap { flex: 1; overflow-x: auto; padding: 28px 32px 48px; }
    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(270px, 1fr));
      gap: 20px;
      min-width: 1200px;
    }
    @media (max-width: 700px) {
      .board-wrap { padding: 12px 10px 40px; overflow-x: unset; }
      .board { grid-template-columns: 1fr; min-width: unset; gap: 14px; }
    }

    /* ─── Column ─── */
    .col {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* Cabeçalho da coluna */
    .col-head {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: #fff;
      position: relative;
    }
    .col-head::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--col-color);
    }
    .col-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .col-period-label {
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted);
    }
    .col-badge {
      font-size: .68rem; font-weight: 700;
      background: var(--col-color);
      color: #fff;
      padding: 2px 9px;
      border-radius: 20px;
      letter-spacing: .4px;
    }
    .col-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--col-color);
    }

    /* ─── Lista de tarefas ─── */
    .col-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
    }

    /* Tarefa individual */
    .task-item {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      background: #fff;
      transition: background .15s var(--ease);
      position: relative;
      min-height: 0;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #f0f9ff; }

    /* Número lateral */
    .task-num {
      flex-shrink: 0;
      width: 36px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 13px;
      font-size: .72rem;
      font-weight: 700;
      color: var(--col-color);
      opacity: .6;
      border-right: 1px solid var(--border);
      background: transparent;
    }

    /* Conteúdo da tarefa */
    .task-content {
      flex: 1;
      padding: 11px 12px 11px 13px;
      min-width: 0;
    }
    .task-text {
      font-size: .855rem;
      font-weight: 500;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* Ações — aparecem ao hover (sempre visíveis em touch) */
    .task-actions {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 8px 8px 4px;
      opacity: 0;
      transition: opacity .18s var(--ease);
      justify-content: center;
    }
    .task-item:hover .task-actions { opacity: 1; }
    @media (hover: none) {
      .task-actions { opacity: 1; }
    }

    .act-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .15s;
      line-height: 1;
    }
    .act-btn:hover { background: var(--st-light); color: var(--st-dark-blue); border-color: var(--st-mid-blue); }
    .act-btn.del:hover { background: #fff0f0; color: #dc2626; border-color: #fca5a5; }

    /* ─── Edição inline ─── */
    .edit-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 20;
      background: #fff;
      border: 2px solid var(--col-color);
      border-radius: 0;
      padding: 10px 12px;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .edit-overlay.show { display: flex; }
    .edit-overlay textarea {
      width: 100%;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .855rem;
      line-height: 1.6;
      padding: 8px 10px;
      resize: none;
      min-height: 64px;
      transition: border .2s;
    }
    .edit-overlay textarea:focus { outline: none; border-color: var(--col-color); background: #fff; }
    .edit-row { display: flex; gap: 6px; }
    .edit-save, .edit-cancel {
      flex: 1; padding: 7px 10px; border-radius: 6px;
      font-family: 'Inter', sans-serif; font-size: .8rem; font-weight: 600;
      cursor: pointer; border: none; transition: all .15s;
    }
    .edit-save { background: var(--col-color); color: #fff; }
    .edit-save:hover { filter: brightness(1.08); }
    .edit-cancel { background: #f1f5f9; color: var(--muted); }
    .edit-cancel:hover { background: #e2e8f0; color: var(--text); }

    /* ─── Vazio ─── */
    .col-empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      line-height: 1.5;
      border-bottom: 1px dashed var(--border);
    }
    .col-empty span { font-size: 1.5rem; display: block; margin-bottom: 6px; opacity: .4; }

    /* ─── Adicionar tarefa ─── */
    .col-footer {
      padding: 10px 12px;
      background: #f8fafc;
      border-top: 1px solid var(--border);
    }
    .add-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px dashed #cbd5e1;
      background: transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: .82rem; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all .2s;
    }
    .add-btn:hover {
      border-color: var(--col-color);
      color: var(--col-color);
      background: #fff;
    }
    .add-icon { font-size: 1.1rem; line-height: 1; margin-bottom: 1px; }

    /* ─── Modal ─── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(2, 80, 110, 0.55);
      backdrop-filter: blur(5px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity .25s var(--ease);
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%; max-width: 480px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.22);
      transform: scale(.96) translateY(16px);
      transition: transform .28s var(--ease);
      overflow: hidden;
    }
    .modal-bg.open .modal { transform: scale(1) translateY(0); }

    .modal-header {
      padding: 20px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .modal-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--modal-color, var(--st-mid-blue)); flex-shrink: 0; }
    .modal-header h2 { font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 700; flex: 1; color: var(--text); }
    .modal-close {
      width: 30px; height: 30px;
      color: var(--muted); font-size: 18px;
      background: none; border: none; cursor: pointer; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .modal-close:hover { background: #f1f5f9; color: var(--text); }

    .modal-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }

    label.field-label {
      display: block;
      font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--st-teal);
      margin-bottom: 7px;
    }
    textarea.field, select.field {
      width: 100%;
      background: #f8fafc;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      line-height: 1.55;
      transition: all .2s;
      resize: vertical;
    }
    textarea.field { min-height: 110px; }
    textarea.field:focus, select.field:focus {
      outline: none;
      border-color: var(--modal-color, var(--st-mid-blue));
      background: #fff;
      box-shadow: 0 0 0 4px rgba(3, 156, 201, 0.12);
    }
    select.field {
      appearance: none; cursor: pointer;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2364748b%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 11px auto;
      padding-right: 38px;
    }

    .modal-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .btn {
      padding: 9px 22px; border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: .9rem; font-weight: 600;
      cursor: pointer; border: none; transition: all .2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--st-mid-blue), var(--st-dark-blue)); color: #fff; box-shadow: 0 4px 12px rgba(2,113,145,0.3); }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-ghost { background: #f1f5f9; color: var(--muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: #e2e8f0; color: var(--text); }

    /* ─── Print ─── */
    @media print {
      header, .add-btn, .task-actions, .modal-bg { display: none !important; }
      body { background: #fff; }
      .board { display: block; }
      .col { border: 1px solid #ccc; margin-bottom: 16px; page-break-inside: auto; }
      .task-item { border-bottom: 1px solid #eee; page-break-inside: avoid; }
    }

    @media (max-width: 900px) {
      header { padding: 12px 16px; gap: 8px; }
      .brand-logo img { height: 36px; }
      .brand-text h1 { font-size: 1rem; }
      .board-wrap { padding: 16px; }
    }
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; padding: 10px 14px; }
      .header-date { font-size: .75rem; padding: 5px 12px; }
      .modal { margin: 0 8px; }
      .modal-body { padding: 14px 16px; }
      .modal-footer { padding: 12px 16px; flex-direction: column; }
      .modal-footer .btn { width: 100%; text-align: center; }
      .btn { padding: 11px 16px; font-size: .95rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-logo">
      <img src="http://www.jardimsainttropez.com.br/logo-palavra3.png" alt="Jardim Saint Tropez" />
    </div>
    <div class="brand-text">
      <h1>Quadro de Tarefas</h1>
      <p>Gestão de Atividades do Condomínio</p>
    </div>
  </div>
  <div class="header-date" id="headerDate"></div>
</header>

<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg" onclick="closeBgClick(event)">
  <div class="modal" id="modalEl">
    <div class="modal-header">
      <div class="modal-dot" id="modalDot"></div>
      <h2 id="modalTitle">Nova Tarefa</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div>
        <label class="field-label">Descrição da Tarefa</label>
        <textarea class="field" id="mText" placeholder="Descreva a tarefa..."></textarea>
      </div>
      <div>
        <label class="field-label">Periodicidade</label>
        <select class="field" id="mPeriod"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveModal()">Salvar Tarefa</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────
const PERIODS = [
  { id:'daily',     label:'Diária',     sub:'Todos os dias',      color:'var(--c-daily)'     },
  { id:'weekly',    label:'Semanal',    sub:'Uma vez por semana', color:'var(--c-weekly)'    },
  { id:'biweekly',  label:'Quinzenal',  sub:'A cada 15 dias',     color:'var(--c-biweekly)'  },
  { id:'monthly',   label:'Mensal',     sub:'Uma vez por mês',    color:'var(--c-monthly)'   },
  { id:'quarterly', label:'Trimestral', sub:'A cada 3 meses',     color:'var(--c-quarterly)' },
];

const DEFAULTS = {
  daily: [
    'Varrição – Alamedas / Rua Principal / Estacionamento / Quadra / Calçada Dulcídio / Jardim e Quintal ADM com rega',
    'Esvaziar as lixeiras dos postes',
    'Higienização do Parquinho – Varrer e passar produto em todos os brinquedos',
    'Limpeza Banheiros Guaritas e Quadra',
    'Limpeza Guaritas – Varrer / Passar pano balcão / Limpar janelas / Frigobar / Interfone',
    'Higienização do bebedouro da Quadra',
    'Coleta de Lixo – 10:30 e 15h / 13h aos fins de semana',
    'Verificação de sacos de dejetos',
    'Verificação de lâmpadas',
    'Verificação de rodas dos carrinhos (Compras / Lixo / Carga)',
    'Verificação de copos / Papel higiênico / Papel toalha',
  ],
  weekly: [
    'Limpeza Administração – (Mesas / Geladeira / Pia / Banheiro)',
    'Limpeza Banheiro Salão – Segunda (ou Sexta caso haja festa)',
    'Limpeza dos Ralos (Bocas de Lobo) – Sexta-feira ou quando houver previsão de chuva forte',
    'Limpeza / Manutenção Jardim do Canal (Externo – Ciclovia) – Varrição / Capina',
    'Manutenção Pedras Portuguesas',
    'Limpeza Banheiro / Vestiário Funcionários',
    'Limpeza dos Portões Garagem e Pedestres – Canal e Américas',
    'Limpeza Copa Funcionários – Microondas / Geladeira / Ventilador / Pia (Cuba e Bancada)',
    'Verificação de Caixas de Gordura das Alamedas',
  ],
  biweekly: [
    'Cortar Grama Américas / Gramadão / Alameda 1 / 3 Casas',
    'Lavagem da Churrasqueira',
    'Lavagem Bancos e Lixeiras dos Postes',
    'Lavagem de Toldos do Salão',
    'Poda de Plantas que impedem as Alamedas e Câmeras',
    'Lavagem das Luminárias',
  ],
  monthly: [
    'Limpeza Calhas e Telhados Salão / Administração / Guaritas',
    'Limpeza das Caixas d\'Água Salão e Administração',
    'Lavagem das Alamedas',
  ],
  quarterly: [
    'Limpar Portas dos PCs de Energia',
  ],
};

// ── STATE ────────────────────────────────────
let data = {};
let modal = { mode: null, period: null };

function load() {
  const s = localStorage.getItem('sainttropez_board_v3');
  if (s) { try { data = JSON.parse(s); return; } catch {} }
  data = {};
  for (const p of PERIODS) data[p.id] = [...(DEFAULTS[p.id] || [])];
  persist();
}
function persist() { localStorage.setItem('sainttropez_board_v3', JSON.stringify(data)); }

// ── RENDER ───────────────────────────────────
function renderBoard() {
  document.getElementById('board').innerHTML = PERIODS.map(renderCol).join('');
}

function renderCol(p) {
  const items = data[p.id] || [];
  const body = items.length === 0
    ? `<div class="col-empty"><span>📋</span>Nenhuma tarefa cadastrada.</div>`
    : items.map((text, i) => renderItem(text, i, p)).join('');

  return `
  <div class="col" style="--col-color:${p.color}">
    <div class="col-head">
      <div class="col-head-top">
        <span class="col-period-label">${p.sub}</span>
        <span class="col-badge">${items.length}</span>
      </div>
      <div class="col-title">${p.label}</div>
    </div>
    <div class="col-body" id="body_${p.id}">${body}</div>
    <div class="col-footer">
      <button class="add-btn" onclick="openAdd('${p.id}')">
        <span class="add-icon">＋</span> Adicionar Tarefa
      </button>
    </div>
  </div>`;
}

function renderItem(text, idx, p) {
  return `
  <div class="task-item" id="item_${p.id}_${idx}" style="--col-color:${p.color}">
    <div class="task-num">${idx + 1}</div>
    <div class="task-content">
      <div class="task-text">${escHtml(text)}</div>
    </div>
    <div class="task-actions">
      <button class="act-btn" title="Editar" onclick="startEdit('${p.id}',${idx})">✎</button>
      <button class="act-btn del" title="Remover" onclick="removeItem('${p.id}',${idx})">✕</button>
    </div>
    <div class="edit-overlay" id="eo_${p.id}_${idx}" style="--col-color:${p.color}">
      <textarea id="et_${p.id}_${idx}">${escHtml(text)}</textarea>
      <div class="edit-row">
        <button class="edit-save" onclick="saveEdit('${p.id}',${idx})">✔ Salvar</button>
        <button class="edit-cancel" onclick="cancelEdit('${p.id}',${idx})">Cancelar</button>
      </div>
    </div>
  </div>`;
}

// ── EDIT INLINE ──────────────────────────────
function startEdit(pid, idx) {
  const eo = document.getElementById(`eo_${pid}_${idx}`);
  eo.classList.add('show');
  const ta = document.getElementById(`et_${pid}_${idx}`);
  ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length);
}
function cancelEdit(pid, idx) { document.getElementById(`eo_${pid}_${idx}`).classList.remove('show'); }
function saveEdit(pid, idx) {
  const val = document.getElementById(`et_${pid}_${idx}`).value.trim();
  if (!val) return;
  data[pid][idx] = val;
  persist(); renderBoard();
}

// ── REMOVE ───────────────────────────────────
function removeItem(pid, idx) {
  if (!confirm('Remover esta tarefa?')) return;
  data[pid].splice(idx, 1);
  persist(); renderBoard();
}

// ── MODAL ────────────────────────────────────
function openAdd(pid) {
  const p = PERIODS.find(x => x.id === pid);
  modal = { mode: 'add', period: pid };
  document.getElementById('modalTitle').textContent = `Nova tarefa — ${p.label}`;
  document.getElementById('modalDot').style.background = p.color;
  document.getElementById('mText').value = '';
  document.body.style.setProperty('--modal-color', p.color);
  const sel = document.getElementById('mPeriod');
  sel.innerHTML = PERIODS.map(x => `<option value="${x.id}"${x.id===pid?' selected':''}>${x.label} – ${x.sub}</option>`).join('');
  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('mText').focus(), 150);
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  modal = { mode: null, period: null };
}
function closeBgClick(e) { if (e.target === document.getElementById('modalBg')) closeModal(); }
function saveModal() {
  const text = document.getElementById('mText').value.trim();
  const pid  = document.getElementById('mPeriod').value;
  if (!text) { document.getElementById('mText').focus(); return; }
  if (!data[pid]) data[pid] = [];
  data[pid].push(text);
  persist(); closeModal(); renderBoard();
}

// ── UTILS ────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function updateDate() {
  const d = new Date();
  let s = d.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  document.getElementById('headerDate').textContent = s.charAt(0).toUpperCase() + s.slice(1);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && e.ctrlKey && document.getElementById('modalBg').classList.contains('open')) saveModal();
});

load(); updateDate(); renderBoard();
</script>
</body>
</html>
